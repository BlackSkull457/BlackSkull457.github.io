    <head>
    <style>
            .neonText {
        animation: flicker 1.5s infinite alternate;
        color: #fff;
      }
      
      h1 {
        font-size: 4.2rem;    
      }
      
      /* Flickering animation */
      @keyframes flicker {
          
        0%, 18%, 22%, 25%, 53%, 57%, 90% {
      
            text-shadow:
            0 0 4px #fff,
            0 0 11px #fff,
            0 0 19px #fff,
            0 0 40px rgb(76, 0, 255),
            0 0 80px rgb(76, 0, 255),
            0 0 90px rgb(76, 0, 255),
            0 0 100px rgb(76, 0, 255),
            0 0 150px rgb(76, 0, 255);
        
        }
        
        20%, 24%, 55% {        
            text-shadow: none;
        }    
      }
      
      
      /* Additional styling */
        
      
      body {
        font-size: 18px;
        font-family: "Helvetica Neue", sans-serif;
        background-color: rgb(13, 8, 24);
      }  
      h1{
          text-align: center;
          font-weight: 400;
          font-family: Helvetica;
      }
      
    </style>
    </head>

</html>
