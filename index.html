<html>
    <head>
    <title> Happy Chinese new year </title>
    <style>
    .neonText {
        animation: flicker 1.5s infinite alternate;
        color: #fff;
      }
      
      h1 {
        font-size: 4.2rem;    
      }
      
      /* Flickering animation */
      @keyframes flicker {
          
        0%, 18%, 22%, 25%, 53%, 57%, 90% {
      
            text-shadow:
            0 0 4px #fff,
            0 0 11px #fff,
            0 0 19px #fff,
            0 0 40px rgb(255, 17, 0),
            0 0 80px rgb(255, 17, 0),
            0 0 90px rgb(255, 17, 0),
            0 0 100px rgb(255, 17, 0),
            0 0 150px rgb(255, 17, 0);
        
        }
        
        20%, 24%, 55% {        
            text-shadow: none;
        }    
      }
      
      
      /* Additional styling */
        
      h2 {
       font-size: 2.8rem;
      }
      h3{font-size: 2.3rem;}
      .container {
        margin-top: 20vh;
      }
      
      body {
        font-size: 18px;
        font-family: "Helvetica Neue", sans-serif;
        background-color: rgb(14, 2, 2);
      }  
      h1{
          text-align: center;
          font-weight: 400;
          font-style: italic;
      }
      h2{
          text-align: center;
        font-weight: 400;
    }
    h3{
          text-align: center;
        font-weight: 400;
    }
      </style>
      <body>
          <script> alert ("heiii there :)")</script>
          <h1 class="neonText">Happy Chinese New Year & Gong Xi Fa Cai</h1>
          <h2 class="neonText">新年快乐，恭喜发财</h2>
          <h3 class="neonText">The Tiger Year</h3>
      </body>
    </head>
